<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<link rel="icon" href="favicon.svg" type="image/svg+xml">
<title>Padpuzzel Generator</title>
<style>
:root {
  --bg: #f5f0eb;
  --panel: #fff;
  --border: #d0c8c0;
  --text: #3d3835;
  --text-muted: #7a726c;
  --accent: #7a9e7e;
  --accent-hover: #5f8263;
  --shadow: rgba(0,0,0,.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  overflow: hidden;
}
body {
  font-family: "Segoe UI", system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  height: 100vh;
  height: 100dvh;
}
.app {
  display: grid;
  grid-template-columns: minmax(280px, 340px) 1fr;
  gap: 1.25rem;
  max-width: 1200px;
  margin: 0 auto;
  padding: 1.25rem;
  height: 100%;
  max-height: 100vh;
  max-height: 100dvh;
  overflow: hidden;
}
@media (max-width: 800px) {
  .app {
    grid-template-columns: 1fr;
    grid-template-rows: auto minmax(0, 1fr);
    gap: 0.5rem;
    padding: 0.5rem;
  }
}
.panel {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.25rem;
  box-shadow: 0 2px 12px var(--shadow);
  overflow-y: auto;
  max-height: 100%;
  -webkit-overflow-scrolling: touch;
}
@media (max-width: 800px) {
  .panel {
    padding: 0.75rem 1rem;
    max-height: 42vh;
  }
  .panel h1 { font-size: 1.15rem; }
  .panel .subtitle { margin-bottom: 0.5rem; }
  .field { margin-bottom: 0.55rem; }
  .btn-row { margin-top: 0.5rem; }
}
@media (max-width: 480px) {
  .app { padding: 0.35rem; gap: 0.35rem; }
  .panel { max-height: 38vh; padding: 0.6rem 0.75rem; }
  button { padding: 0.5rem 0.75rem; font-size: 0.85rem; }
}
.panel h1 {
  font-size: 1.35rem;
  margin-bottom: .25rem;
}
.panel .subtitle {
  color: var(--text-muted);
  font-size: .85rem;
  margin-bottom: 1rem;
}
.field { margin-bottom: .85rem; }
.field label {
  display: block;
  font-size: .8rem;
  font-weight: 600;
  margin-bottom: .3rem;
  color: var(--text-muted);
}
.field select, .field input[type="number"] {
  width: 100%;
  padding: .5rem .65rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: .95rem;
  background: #fff;
}
.color-choices {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: .45rem;
}
.color-choice {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: .25rem;
  padding: .45rem .25rem;
  border: 2px solid var(--border);
  border-radius: 10px;
  background: #fff;
  cursor: pointer;
  font-size: .75rem;
  font-weight: 600;
  color: var(--text-muted);
  transition: border-color .15s, box-shadow .15s;
}
.color-choice:hover { border-color: #b8b0a8; background: #fff; }
.color-choice.selected {
  border-color: var(--accent);
  box-shadow: 0 0 0 2px rgba(122, 158, 126, .25);
  color: var(--text);
  background: #fff;
}
.color-swatch {
  width: 100%;
  max-width: 52px;
  aspect-ratio: 1;
  border-radius: 8px;
  border: 1px solid rgba(0,0,0,.08);
}
.size-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: .5rem;
}
.size-row input { width: 100%; }
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: .5rem;
  margin-top: 1rem;
}
button {
  padding: .55rem 1rem;
  border: none;
  border-radius: 8px;
  font-size: .9rem;
  cursor: pointer;
  background: var(--accent);
  color: #fff;
  font-weight: 600;
}
button:hover { background: var(--accent-hover); }
button.secondary {
  background: #fff;
  color: var(--text);
  border: 1px solid var(--border);
}
button.secondary:hover { background: #f8f6f4; }
.preview-wrap {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 1rem;
  min-height: 0;
  height: 100%;
  overflow: hidden;
}
.preview-card {
  background: var(--panel);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 1.5rem;
  box-shadow: 0 2px 12px var(--shadow);
  width: 100%;
  display: flex;
  flex-direction: column;
  align-items: center;
  flex: 1;
  min-height: 0;
  overflow: hidden;
}
.preview-instruction {
  font-size: 1.05rem;
  text-align: center;
  margin-bottom: 1rem;
  max-width: 520px;
  line-height: 1.45;
  flex-shrink: 0;
}
#svgHost {
  flex: 1;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  width: 100%;
  overflow: hidden;
}
#puzzleSvg {
  max-width: 100%;
  max-height: 100%;
  width: auto;
  height: auto;
}
@media (max-width: 800px) {
  .preview-wrap { gap: 0; }
  .preview-card { padding: 0.75rem; }
  .preview-instruction {
    font-size: 0.9rem;
    margin-bottom: 0.5rem;
  }
}
@media (max-width: 480px) {
  .preview-instruction {
    font-size: 0.82rem;
    line-height: 1.35;
  }
}
.hidden { display: none !important; }

@media print {
  html, body { height: auto; overflow: visible; }
  body { background: #fff; }
  .panel, .btn-row, .no-print { display: none !important; }
  .app { display: block; padding: 0; max-width: none; height: auto; max-height: none; overflow: visible; }
  .preview-wrap, .preview-card, #svgHost { height: auto; overflow: visible; }
  .preview-card { border: none; box-shadow: none; padding: 0; }
  .preview-instruction { font-size: 14pt; margin-bottom: 8mm; }
  #puzzleSvg { max-height: none; }
}
</style>
</head>
<body>
<div class="app">
  <aside class="panel no-print">
    <h1>Padpuzzel</h1>
    <p class="subtitle">Kleurpad-puzzels voor kinderen</p>

    <div class="field">
      <label for="difficulty">Leeftijd</label>
      <select id="difficulty">
        <option value="easy">Makkelijk (3–5 jaar)</option>
        <option value="medium" selected>Middel (6–8 jaar)</option>
        <option value="hard">Moeilijk (9+ jaar)</option>
      </select>
    </div>

    <div class="field">
      <label for="rule">Regel</label>
      <select id="rule">
        <option value="singleColor">Eén kleur volgen</option>
        <option value="avoidColor">Vermijd één kleur</option>
        <option value="multiColor" disabled>Meerdere kleuren — Binnenkort</option>
        <option value="alternateColors" disabled>Afwisselen — Binnenkort</option>
        <option value="colorSequence" disabled>Vaste volgorde — Binnenkort</option>
        <option value="shape" disabled>Vorm — Binnenkort</option>
      </select>
    </div>

    <div class="field">
      <label for="theme">Thema</label>
      <select id="theme">
        <option value="bloementuin">Bloementuin</option>
        <option value="speeltuin">Speeltuin</option>
        <option value="ruimte">Ruimte</option>
        <option value="sprookje">Sprookje</option>
      </select>
    </div>

    <!-- Icoon volgt thema (zie THEME_PACKS.defaultIcon); geen aparte keuze nodig -->

    <div class="field">
      <label>Grootte (rijen × kolommen)</label>
      <div class="size-row">
        <input type="number" id="rows" min="5" max="14" value="9">
        <input type="number" id="cols" min="5" max="14" value="8">
      </div>
    </div>

    <div class="field" id="colorField">
      <label id="colorFieldLabel" for="colorChoices">Welke kleur moet het kind volgen?</label>
      <div class="color-choices" id="colorChoices" role="group" aria-labelledby="colorFieldLabel">
        <button type="button" class="color-choice selected" data-color="geel" aria-pressed="true">
          <span class="color-swatch" style="background:linear-gradient(135deg,#DDD4A0 50%,#C8BE88 50%)"></span>
          Geel
        </button>
        <button type="button" class="color-choice" data-color="groen" aria-pressed="false">
          <span class="color-swatch" style="background:linear-gradient(135deg,#C4D2B8 50%,#A8B89E 50%)"></span>
          Groen
        </button>
        <button type="button" class="color-choice" data-color="roze" aria-pressed="false">
          <span class="color-swatch" style="background:linear-gradient(135deg,#E8B4B8 50%,#D4989E 50%)"></span>
          Roze
        </button>
        <button type="button" class="color-choice" data-color="blauw" aria-pressed="false">
          <span class="color-swatch" style="background:linear-gradient(135deg,#B4C4CC 50%,#9AADB6 50%)"></span>
          Blauw
        </button>
      </div>
    </div>

    <div class="btn-row">
      <button id="btnNew">Nieuwe puzzel</button>
      <button class="secondary" id="btnPng">Download PNG</button>
      <button class="secondary" id="btnPdf">Download PDF</button>
      <button class="secondary" id="btnPrint">Print</button>
    </div>
  </aside>

  <main class="preview-wrap">
    <div class="preview-card" id="printArea">
      <p class="preview-instruction" id="instructionDisplay"></p>
      <div id="svgHost"></div>
    </div>
  </main>
</div>

<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.2/dist/jspdf.umd.min.js"></script>
<script>
/* ── CONFIG ─────────────────────────────────────────────────── */
const PALETTE = {
  geel:  { light: '#DDD4A0', dark: '#C8BE88', name: 'geel',  adj: 'gele' },
  groen: { light: '#C4D2B8', dark: '#A8B89E', name: 'groen', adj: 'groene' },
  roze:  { light: '#E8B4B8', dark: '#D4989E', name: 'roze',  adj: 'roze' },
  blauw: { light: '#B4C4CC', dark: '#9AADB6', name: 'blauw', adj: 'blauwe' }
};
const PALETTE_KEYS = Object.keys(PALETTE);

const DIFFICULTY_PRESETS = {
  easy:   { rows: 6, cols: 7,  brighten: 28 },
  medium: { rows: 9, cols: 8,  brighten: 0 },
  hard:   { rows: 11, cols: 12, brighten: -12 }
};

const COLOR_LABELS = {
  singleColor: 'Welke kleur moet het kind volgen?',
  avoidColor: 'Welke kleur mag NIET?'
};

/* Elk thema heeft precies één icoon (1:1); figure voor instructietekst */
const THEME_PACKS = {
  bloementuin: { start: 'Vlinder', goal: 'Bloem', figure: 'vlinder', defaultIcon: 'flower' },
  speeltuin:   { start: 'Kind', goal: 'Glijbaan', figure: 'kind', defaultIcon: 'ball' },
  ruimte:      { start: 'Astronaut', goal: 'Raket', figure: 'astronaut', defaultIcon: 'wheel' },
  sprookje:    { start: 'Prinses', goal: 'Kasteel', figure: 'prinses', defaultIcon: 'heart' }
};

function iconForTheme(themeId) {
  const theme = THEME_PACKS[themeId];
  return (theme && theme.defaultIcon) || 'flower';
}

const CELL_WORD = { vlinder: 'bloemen' };

const RULE_TEXT = {
  singleColor: (theme, colorName) =>
    `Help de ${theme.figure} van boven naar beneden. Loop alleen over ${colorName} ${CELL_WORD[theme.figure] || 'vakjes'}.`,
  avoidColor: (theme, colorName) =>
    `Help de ${theme.figure} van boven naar beneden. Je mag overal staan, behalve op ${colorName} vakjes.`
};

/* ── RNG ────────────────────────────────────────────────────── */
function makeRng(seed) {
  let s = (seed >>> 0) || 1;
  return {
    next() {
      s += 0x6D2B79F5;
      let t = s;
      t = Math.imul(t ^ (t >>> 15), t | 1);
      t ^= t + Math.imul(t ^ (t >>> 7), t | 61);
      return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
    },
    int(n) { return Math.floor(this.next() * n); },
    choice(arr) { return arr[this.int(arr.length)]; },
    shuffle(arr) {
      const a = arr.slice();
      for (let i = a.length - 1; i > 0; i--) {
        const j = this.int(i + 1);
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }
  };
}

function randomSeed() {
  return (Date.now() ^ (Math.random() * 0xFFFFFFFF)) >>> 0;
}

/* ── MAZE: DFS PATH ─────────────────────────────────────────── */
function cellKey(r, c) { return r + ',' + c; }

function neighbors4(r, c, rows, cols) {
  const n = [];
  if (r > 0) n.push([r - 1, c]);
  if (r < rows - 1) n.push([r + 1, c]);
  if (c > 0) n.push([r, c - 1]);
  if (c < cols - 1) n.push([r, c + 1]);
  return n;
}

function findBranchFreePathSimple(rows, cols, startCol, goalCol, rng) {
  const path = [[0, startCol]];
  let c = startCol;
  const topVia = rng.int(2) === 0 ? goalCol : rng.int(cols);
  while (c !== topVia) {
    c += c < topVia ? 1 : -1;
    path.push([0, c]);
  }
  if (rows === 2) {
    while (c !== goalCol) {
      c += c < goalCol ? 1 : -1;
      path.push([0, c]);
    }
    path.push([rows - 1, goalCol]);
    return path;
  }
  for (let r = 1; r < rows - 1; r++) path.push([r, topVia]);
  c = topVia;
  const lastRow = rows - 2;
  while (c !== goalCol) {
    c += c < goalCol ? 1 : -1;
    path.push([lastRow, c]);
  }
  path.push([rows - 1, goalCol]);
  return path;
}

function wouldCreateBranch(path, cell) {
  for (let i = 0; i < path.length - 1; i++) {
    if (isOrthogonal(path[i], cell)) return true;
  }
  return false;
}

function straightRunLen(path) {
  if (path.length < 2) return 0;
  const dr = path[path.length - 1][0] - path[path.length - 2][0];
  const dc = path[path.length - 1][1] - path[path.length - 2][1];
  let len = 1;
  for (let i = path.length - 2; i >= 1; i--) {
    const dr2 = path[i][0] - path[i - 1][0];
    const dc2 = path[i][1] - path[i - 1][1];
    if (dr2 === dr && dc2 === dc) len++;
    else break;
  }
  return len;
}

function countTurns(path) {
  if (path.length < 3) return 0;
  let turns = 0;
  for (let i = 2; i < path.length; i++) {
    const dr1 = path[i - 1][0] - path[i - 2][0];
    const dc1 = path[i - 1][1] - path[i - 2][1];
    const dr2 = path[i][0] - path[i - 1][0];
    const dc2 = path[i][1] - path[i - 1][1];
    if (dr1 !== dr2 || dc1 !== dc2) turns++;
  }
  return turns;
}

/** Min bochten per leeftijd: easy 4+, medium 8+, hard 12+ */
function minTurnsForSize(rows) {
  if (rows <= 6) return 4;
  if (rows <= 9) return 8;
  return 12;
}

/**
 * Sorteer buren op windigheid: na 1–2 rechte stappen sterk loodrechte bocht prefereren.
 * Horizontale rechte lijnen extra bestraffen (singleColor-blobs).
 * Metrics (200 seeds): medium 9×8 avg turns ~11 vs ~6 vóór deze wijziging.
 */
function orderNeighborsForWindiness(path, neighbors, rng) {
  const [r, c] = path[path.length - 1];
  let pdr = 0;
  let pdc = 0;
  if (path.length >= 2) {
    pdr = r - path[path.length - 2][0];
    pdc = c - path[path.length - 2][1];
  }
  const runLen = straightRunLen(path);
  const horizRun = pdc !== 0;

  const scored = neighbors.map(([nr, nc]) => {
    const dr = nr - r;
    const dc = nc - c;
    const isSame = dr === pdr && dc === pdc;
    const isUTurn = dr === -pdr && dc === -pdc;
    const isPerp = !isSame && !isUTurn && (pdr !== 0 || pdc !== 0);

    let score = rng.next() * 0.01;
    if (path.length < 2) {
      score += 10;
    } else if (isPerp) {
      score += runLen >= 2 ? 200 : (runLen >= 1 ? 130 : 55);
    } else if (isSame) {
      score -= runLen >= 2 ? 180 : (runLen >= 1 ? 90 : 15);
      if (horizRun) score -= runLen * 30;
    } else if (isUTurn) {
      score += runLen >= 2 ? 25 : 5;
    } else {
      score += 35;
    }
    return { cell: [nr, nc], score };
  });

  scored.sort((a, b) => b.score - a.score);
  return scored.map(s => s.cell);
}

/** Random worm met backtracking: 4 richtingen; geen vertakking; ~elke 2 stappen een bocht */
function findBranchFreePathWindy(rows, cols, startCol, goalCol, rng) {
  const goal = [rows - 1, goalCol];
  const maxTotal = rows * cols * 3;

  function tryWalk() {
    const path = [[0, startCol]];
    const visited = new Set([cellKey(0, startCol)]);
    let dir = null;
    let stepsInDir = 0;
    let maxStepsInDir = 0;
    let steps = 0;

    while (steps++ < maxTotal) {
      const [r, c] = path[path.length - 1];
      if (r === goal[0] && c === goal[1] && path.length >= rows) return path;

      if (dir === null || stepsInDir >= maxStepsInDir) {
        maxStepsInDir = rng.int(2) + 1;
        stepsInDir = 0;
        dir = null;
      }

      let candidates = neighbors4(r, c, rows, cols).filter(([nr, nc]) => {
        if (visited.has(cellKey(nr, nc))) return false;
        if (wouldCreateBranch(path, [nr, nc])) return false;
        if (nr === rows - 1 && nc !== goalCol) return false;
        return true;
      });

      if (!candidates.length) {
        if (path.length <= 1) return null;
        const removed = path.pop();
        visited.delete(cellKey(...removed));
        dir = null;
        stepsInDir = 0;
        continue;
      }

      const ordered = orderNeighborsForWindiness(path, candidates, rng);
      const runLen = straightRunLen(path);
      let pick;

      if (dir !== null && stepsInDir < maxStepsInDir && runLen < 2) {
        const [dr, dc] = dir;
        const cont = candidates.find(([nr, nc]) => nr - r === dr && nc - c === dc);
        const best = ordered[0];
        const bestIsCont = cont && best[0] - r === dr && best[1] - c === dc;
        pick = bestIsCont ? cont : best;
      } else {
        pick = ordered[rng.int(Math.min(2, ordered.length))];
      }

      dir = [pick[0] - r, pick[1] - c];
      stepsInDir++;
      path.push(pick);
      visited.add(cellKey(...pick));
    }
    return null;
  }

  for (let i = 0; i < 120; i++) {
    const result = tryWalk();
    if (result) return result;
  }
  return null;
}

function findBranchFreePath(rows, cols, startCol, goalCol, rng, minTurns) {
  const minT = minTurns ?? minTurnsForSize(rows);
  for (let attempt = 0; attempt < 64; attempt++) {
    const path = findBranchFreePathWindy(rows, cols, startCol, goalCol, rng);
    if (path && path.length >= rows && countTurns(path) >= minT) return path;
  }
  for (let attempt = 0; attempt < 24; attempt++) {
    const path = findBranchFreePathWindy(rows, cols, startCol, goalCol, rng);
    if (path && path.length >= rows) return path;
  }
  return findBranchFreePathSimple(rows, cols, startCol, goalCol, rng);
}

function dfsPath(rows, cols, rng) {
  const startCol = rng.int(cols);
  const goalCol = rng.int(cols);
  return findBranchFreePath(rows, cols, startCol, goalCol, rng);
}

/* ── VALIDATE ───────────────────────────────────────────────── */
function isOrthogonal(a, b) {
  return Math.abs(a[0] - b[0]) + Math.abs(a[1] - b[1]) === 1;
}

function validatePuzzle(puzzle, rows, cols, ruleId) {
  const { path, grid } = puzzle;
  if (!path || path.length < rows) return 'Pad te kort';

  if (path[0][0] !== 0) return 'Start niet op bovenste rij';
  if (path[path.length - 1][0] !== rows - 1) return 'Einde niet op onderste rij';

  const seen = new Set();
  for (const [r, c] of path) {
    const k = cellKey(r, c);
    if (seen.has(k)) return 'Pad herhaalt cel';
    seen.add(k);
  }

  for (let i = 1; i < path.length; i++) {
    if (!isOrthogonal(path[i - 1], path[i])) return 'Schuine stap in pad';
  }

  const index = new Map(path.map((cell, i) => [cellKey(...cell), i]));
  for (const a of path) {
    for (const b of path) {
      if (a === b) continue;
      if (isOrthogonal(a, b) && Math.abs(index.get(cellKey(...a)) - index.get(cellKey(...b))) !== 1) {
        return 'Vertakking in pad';
      }
    }
  }

  const trailCells = new Set(path.map(([r, c]) => cellKey(r, c)));
  let bottomTrail = 0;
  for (let c = 0; c < cols; c++) {
    if (grid[rows - 1][c].isTrail) bottomTrail++;
  }
  if (bottomTrail !== 1) return 'Onderste rij moet precies 1 padcel hebben';

  if (ruleId === 'singleColor') {
    for (let r = 0; r < rows; r++) {
      for (let c = 0; c < cols; c++) {
        const onPath = trailCells.has(cellKey(r, c));
        if (grid[r][c].isTrail !== onPath) return 'Padkleur komt niet overeen';
      }
    }
  }

  if (ruleId === 'avoidColor') {
    const avoid = puzzle.avoid;
    for (const [r, c] of path) {
      const cell = grid[r][c];
      if (cell.light.toLowerCase() === avoid.light.toLowerCase()) return 'Padcel heeft vermeden kleur';
    }
  }

  return null;
}

/* ── RULES ────────────────────────────────────────────────── */
function brighten(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.min(255, ((n >> 16) & 255) + amount);
  const g = Math.min(255, ((n >> 8) & 255) + amount);
  const b = Math.min(255, (n & 255) + amount);
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
}

function palettePair(key, brightenAmount = 0) {
  const p = PALETTE[key];
  if (!brightenAmount) return { light: p.light, dark: p.dark };
  const light = brightenAmount > 0 ? brighten(p.light, brightenAmount) : darken(p.light, -brightenAmount);
  const dark = brightenAmount > 0 ? brighten(p.dark, brightenAmount) : darken(p.dark, -brightenAmount);
  return { light, dark };
}

function getChosenColorKey() {
  const btn = document.querySelector('.color-choice.selected');
  return (btn && btn.dataset.color) || 'geel';
}

function setChosenColorKey(key) {
  document.querySelectorAll('.color-choice').forEach(btn => {
    const on = btn.dataset.color === key;
    btn.classList.toggle('selected', on);
    btn.setAttribute('aria-pressed', on ? 'true' : 'false');
  });
}

function updateColorFieldUi(ruleId) {
  document.getElementById('colorFieldLabel').textContent =
    COLOR_LABELS[ruleId] || COLOR_LABELS.singleColor;
}

function buildColorConfig(ruleId, chosenKey, brightenAmount) {
  const others = PALETTE_KEYS.filter(k => k !== chosenKey);
  if (ruleId === 'avoidColor') {
    const avoid = palettePair(chosenKey, brightenAmount);
    const safe = others.map(k => palettePair(k, brightenAmount));
    return { trail: safe[0], distractors: safe, avoid, chosenColor: chosenKey };
  }
  return {
    trail: palettePair(chosenKey, brightenAmount),
    distractors: others.map(k => palettePair(k, brightenAmount)),
    avoid: palettePair('roze', brightenAmount),
    chosenColor: chosenKey
  };
}
function darken(hex, amount) {
  const n = parseInt(hex.slice(1), 16);
  const r = Math.max(0, ((n >> 16) & 255) - amount);
  const g = Math.max(0, ((n >> 8) & 255) - amount);
  const b = Math.max(0, (n & 255) - amount);
  return '#' + [r, g, b].map(x => x.toString(16).padStart(2, '0')).join('');
}

function colorPair(light, dark) {
  return { light, dark: dark || darken(light, 24) };
}

function isAvoided(pair, avoid) {
  return pair.light.toLowerCase() === avoid.light.toLowerCase();
}

function fillGridSingle(path, rows, cols, rng, trail, distractors) {
  const route = new Set(path.map(([r, c]) => cellKey(r, c)));
  const grid = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      if (route.has(cellKey(r, c))) {
        row.push({ ...trail, isTrail: true });
      } else {
        row.push({ ...rng.choice(distractors), isTrail: false });
      }
    }
    grid.push(row);
  }
  return grid;
}

function fillGridAvoid(path, rows, cols, rng, trail, distractors, avoid) {
  const route = new Set(path.map(([r, c]) => cellKey(r, c)));
  const safeForPath = distractors.filter(d => !isAvoided(d, avoid));
  if (!safeForPath.some(d => d.light === trail.light)) safeForPath.push(trail);
  const allDistractors = [...distractors, avoid];

  const grid = [];
  for (let r = 0; r < rows; r++) {
    const row = [];
    for (let c = 0; c < cols; c++) {
      if (route.has(cellKey(r, c))) {
        row.push({ ...rng.choice(safeForPath), isTrail: true });
      } else {
        row.push({ ...rng.choice(allDistractors), isTrail: false });
      }
    }
    grid.push(row);
  }
  return grid;
}

function generatePuzzle(config) {
  const { rows, cols, seed, ruleId, trail, distractors, avoid } = config;
  const fillRng = makeRng(seed);

  for (let tryNum = 0; tryNum < 100; tryNum++) {
    const pathRng = makeRng((seed ^ Math.imul(tryNum + 1, 0x9E3779B9)) >>> 0);
    const path = dfsPath(rows, cols, pathRng);
    if (!path) continue;

    let grid;
    if (ruleId === 'avoidColor') {
      grid = fillGridAvoid(path, rows, cols, fillRng, trail, distractors, avoid);
    } else {
      grid = fillGridSingle(path, rows, cols, fillRng, trail, distractors);
    }

    const puzzle = {
      grid,
      path,
      startCol: path[0][1],
      endCol: path[path.length - 1][1],
      avoid: avoid
    };

    const err = validatePuzzle(puzzle, rows, cols, ruleId);
    if (!err) return puzzle;
  }
  return null;
}

/* ── RENDER: ICONS ────────────────────────────────────────── */
const NS = 'http://www.w3.org/2000/svg';

function el(tag, attrs) {
  const e = document.createElementNS(NS, tag);
  for (const [k, v] of Object.entries(attrs || {})) e.setAttribute(k, v);
  return e;
}

function drawFlower(g, cx, cy, s, light, dark) {
  const petal = s * 0.38;
  const offsets = [[0, s * 0.55], [s * 0.55, 0], [0, -s * 0.55], [-s * 0.55, 0]];
  for (const [dx, dy] of offsets) {
    g.appendChild(el('circle', { cx: cx + dx, cy: cy + dy, r: petal, fill: light }));
  }
  g.appendChild(el('circle', { cx, cy, r: s * 0.28, fill: dark }));
}

function drawBall(g, cx, cy, s, light, dark) {
  g.appendChild(el('circle', { cx, cy, r: s * 0.52, fill: light }));
  g.appendChild(el('circle', { cx: cx - s * 0.14, cy: cy - s * 0.14, r: s * 0.14, fill: '#fff', opacity: '0.55' }));
  g.appendChild(el('circle', { cx, cy, r: s * 0.2, fill: dark }));
}

function drawHeart(g, cx, cy, s, light, dark) {
  const path = el('path', {
    d: `M ${cx} ${cy + s * 0.42}
        C ${cx - s * 0.58} ${cy - s * 0.02}, ${cx - s * 0.52} ${cy - s * 0.52}, ${cx} ${cy - s * 0.18}
        C ${cx + s * 0.52} ${cy - s * 0.52}, ${cx + s * 0.58} ${cy - s * 0.02}, ${cx} ${cy + s * 0.42} Z`,
    fill: light
  });
  g.appendChild(path);
  g.appendChild(el('circle', { cx, cy: cy + s * 0.06, r: s * 0.12, fill: dark }));
}

function drawWheel(g, cx, cy, s, light, dark) {
  g.appendChild(el('circle', { cx, cy, r: s * 0.52, fill: light }));
  for (let i = 0; i < 4; i++) {
    const a = (i * Math.PI) / 2;
    g.appendChild(el('line', {
      x1: cx, y1: cy,
      x2: cx + Math.cos(a) * s * 0.46,
      y2: cy + Math.sin(a) * s * 0.46,
      stroke: dark, 'stroke-width': s * 0.09, 'stroke-linecap': 'round'
    }));
  }
  g.appendChild(el('circle', { cx, cy, r: s * 0.17, fill: dark }));
}

const ICON_DRAWERS = { flower: drawFlower, ball: drawBall, heart: drawHeart, wheel: drawWheel };

function drawGrid(puzzle, config) {
  const { rows, cols, icon } = config;
  const cellSize = Math.min(520 / cols, 480 / rows, 56);
  const margin = 12;
  const strokeW = 1;
  const strokePad = strokeW;
  const w = cols * cellSize + margin * 2;
  const h = rows * cellSize + margin * 2;

  const svg = el('svg', {
    id: 'puzzleSvg',
    width: w,
    height: h,
    viewBox: `${-strokePad} ${-strokePad} ${w + strokePad * 2} ${h + strokePad * 2}`,
    xmlns: NS,
    overflow: 'visible'
  });

  svg.appendChild(el('rect', {
    x: strokeW / 2, y: strokeW / 2,
    width: w - strokeW, height: h - strokeW,
    rx: 10, fill: '#fff', stroke: '#ccc', 'stroke-width': strokeW
  }));

  const g = el('g');
  svg.appendChild(g);

  const drawer = ICON_DRAWERS[icon] || drawFlower;
  const s = cellSize * (icon === 'flower' ? 0.42 : 0.55);

  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      const cx = margin + c * cellSize + cellSize / 2;
      const cy = margin + r * cellSize + cellSize / 2;
      const cell = puzzle.grid[r][c];
      drawer(g, cx, cy, s, cell.light, cell.dark);
    }
  }

  return svg;
}

function getInstruction(config) {
  const theme = THEME_PACKS[config.themeId];
  const adj = PALETTE[config.chosenColor].adj;
  const fn = RULE_TEXT[config.ruleId] || RULE_TEXT.singleColor;
  return fn(theme, adj);
}

/* ── UI STATE ───────────────────────────────────────────────── */
let currentSeed = randomSeed();
let currentPuzzle = null;
let debounceTimer = null;

function readConfig() {
  const ruleId = document.getElementById('rule').value;
  const difficulty = document.getElementById('difficulty').value;
  const preset = DIFFICULTY_PRESETS[difficulty] || DIFFICULTY_PRESETS.medium;
  const chosenKey = getChosenColorKey();
  const colors = buildColorConfig(ruleId, chosenKey, preset.brighten || 0);
  return {
    rows: parseInt(document.getElementById('rows').value, 10),
    cols: parseInt(document.getElementById('cols').value, 10),
    ruleId,
    themeId: document.getElementById('theme').value,
    icon: iconForTheme(document.getElementById('theme').value),
    seed: currentSeed,
    ...colors
  };
}

function applyDifficultyPreset(level) {
  const p = DIFFICULTY_PRESETS[level];
  if (!p) return;
  document.getElementById('rows').value = p.rows;
  document.getElementById('cols').value = p.cols;
}

function regenerate() {
  const config = readConfig();
  const puzzle = generatePuzzle(config);
  if (!puzzle) {
    document.getElementById('instructionDisplay').textContent = 'Kon geen puzzel maken — probeer opnieuw.';
    return;
  }
  currentPuzzle = puzzle;

  document.getElementById('instructionDisplay').textContent = getInstruction(config);

  const host = document.getElementById('svgHost');
  host.innerHTML = '';
  host.appendChild(drawGrid(puzzle, config));
}

function scheduleRegenerate() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(regenerate, 150);
}

function svgToCanvas(svg, scale, instruction) {
  return new Promise((resolve, reject) => {
    const xml = new XMLSerializer().serializeToString(svg);
    const blob = new Blob([xml], { type: 'image/svg+xml;charset=utf-8' });
    const url = URL.createObjectURL(blob);
    const img = new Image();
    img.onload = () => {
      const pad = 24;
      const lineH = instruction ? 36 : 0;
      const canvas = document.createElement('canvas');
      canvas.width = (img.width + pad * 2) * scale;
      canvas.height = (img.height + pad * 2 + lineH) * scale;
      const ctx = canvas.getContext('2d');
      ctx.fillStyle = '#fff';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.scale(scale, scale);
      if (instruction) {
        ctx.fillStyle = '#3d3835';
        ctx.font = '16px "Segoe UI", system-ui, sans-serif';
        ctx.textAlign = 'center';
        wrapText(ctx, instruction, (img.width + pad * 2) / 2, pad + 12, img.width, 20);
      }
      ctx.drawImage(img, pad, pad + lineH);
      URL.revokeObjectURL(url);
      resolve(canvas);
    };
    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error('SVG render failed'));
    };
    img.src = url;
  });
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
  const words = text.split(' ');
  let line = '';
  let cy = y;
  for (const word of words) {
    const test = line ? line + ' ' + word : word;
    if (ctx.measureText(test).width > maxWidth && line) {
      ctx.fillText(line, x, cy);
      line = word;
      cy += lineHeight;
    } else {
      line = test;
    }
  }
  if (line) ctx.fillText(line, x, cy);
}

async function downloadPng() {
  const svg = document.getElementById('puzzleSvg');
  if (!svg) return;
  const instruction = document.getElementById('instructionDisplay').textContent;
  const canvas = await svgToCanvas(svg, 2, instruction);
  canvas.toBlob(b => {
    const a = document.createElement('a');
    a.href = URL.createObjectURL(b);
    a.download = 'padpuzzel.png';
    a.click();
    URL.revokeObjectURL(a.href);
  }, 'image/png');
}

async function downloadPdf() {
  const svg = document.getElementById('puzzleSvg');
  if (!svg || !window.jspdf) return;
  const instruction = document.getElementById('instructionDisplay').textContent;
  const canvas = await svgToCanvas(svg, 2, instruction);
  const { jsPDF } = window.jspdf;
  const imgData = canvas.toDataURL('image/png');
  const pxW = canvas.width;
  const pxH = canvas.height;
  const mmW = pxW * 0.264583;
  const mmH = pxH * 0.264583;
  const pdf = new jsPDF({
    orientation: mmW > mmH ? 'landscape' : 'portrait',
    unit: 'mm',
    format: [mmW + 10, mmH + 10]
  });
  pdf.addImage(imgData, 'PNG', 5, 5, mmW, mmH);
  pdf.save('padpuzzel.pdf');
}

/* ── INIT ───────────────────────────────────────────────────── */
function init() {
  const difficulty = document.getElementById('difficulty');
  const rule = document.getElementById('rule');

  difficulty.addEventListener('change', () => {
    applyDifficultyPreset(difficulty.value);
    scheduleRegenerate();
  });

  rule.addEventListener('change', () => {
    updateColorFieldUi(rule.value);
    scheduleRegenerate();
  });

  document.querySelectorAll('.color-choice').forEach(btn => {
    btn.addEventListener('click', () => {
      setChosenColorKey(btn.dataset.color);
      scheduleRegenerate();
    });
  });

  document.getElementById('theme').addEventListener('change', scheduleRegenerate);

  ['rows', 'cols'].forEach(id => {
    document.getElementById(id).addEventListener('change', scheduleRegenerate);
    document.getElementById(id).addEventListener('input', scheduleRegenerate);
  });

  document.getElementById('btnNew').addEventListener('click', () => {
    currentSeed = randomSeed();
    regenerate();
  });

  document.getElementById('btnPng').addEventListener('click', () => downloadPng().catch(console.error));
  document.getElementById('btnPdf').addEventListener('click', () => downloadPdf().catch(console.error));
  document.getElementById('btnPrint').addEventListener('click', () => window.print());

  applyDifficultyPreset(difficulty.value);
  updateColorFieldUi(rule.value);
  regenerate();
}

init();
</script>
